name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material mkdocs-jupyter mkdocstrings[python]

      # Sync model.md into notebook and copy to docs/
      - run: |
          python examples/retirement/notebooks/sync_md_to_notebook.py --apply
          mkdir -p docs/notebooks
          rm -f docs/notebooks/retirement_fues.ipynb
          cp examples/retirement/notebooks/retirement_fues.ipynb docs/notebooks/

      - run: pip install -e ".[examples]"

      - run: mkdocs gh-deploy --force
