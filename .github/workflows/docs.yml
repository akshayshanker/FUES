name: Deploy docs

on:
  push:
    branches: [main, release-prep]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material mkdocs-jupyter mkdocstrings[python]

      # Sync notebook into docs/ (symlinks don't survive git checkout)
      - run: |
          mkdir -p docs/notebooks
          cp examples/retirement/notebooks/retirement_fues.ipynb docs/notebooks/

      - run: pip install -e ".[examples]"

      - run: mkdocs gh-deploy --force
