# Calibration for the durables / housing adjustment cost model
# Reference: Dobrescu & Shanker, Application 2
# Values from settings.yml (paper configuration)
calibration:
  # Financial returns
  r: 0.045
  R: 1.045
  r_H: 0
  R_H: 1.0

  # Preferences
  beta: 0.945
  alpha: 0.7
  gamma_c: 3.5
  gamma_h: 1.5
  kappa: 0.06
  sigma: 0.001

  # Housing frictions
  delta: 0
  tau: 0.12
  chi: 0

  # Terminal value
  theta: 1.3498
  K: 1.3


  # Income AR(1) in logs: log z[>] = phi_w * log z + sigma_w * eps[>],  eps[>] ~ N(0,1)
  phi_w: 0.8170411          # rho_z: AR(1) persistence
  sigma_w: 0.1117012        # sigma_z: innovation std dev

  # Wage function polynomial
  lambdas:
    - 4.329982
    - 0.610214
    - -0.0209832
    - 0.0003132
    - -0.00000172
    - 0.0199949
    - 0.0000476
  tau_av: 30
  t0: 40
