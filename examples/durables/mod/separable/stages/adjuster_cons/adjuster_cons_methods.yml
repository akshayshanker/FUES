stage: AdjusterConsumption

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm
        settings: {}

      - scheme: interpolation
        method: !Linear
        grid: endogenous
        settings:
          extrap_policy: extrap_policy
          clamp_max_factor: clamp_max_factor

      - scheme: upper_envelope
        method: !FUES
        settings:
          m_bar: m_bar
          extrap_policy: extrap_policy
          clamp_max_factor: clamp_max_factor

      # Maximization scheme: only used when bellman_backward is overridden
      # to NEGM (VFI). EGM bypasses maximization entirely.
      - scheme: maximization
        method: !golden_section
        settings:
          n_sections: n_sections

  - on: dcsn_to_arvl_mover
    schemes:
      - scheme: interpolation
        method: !Linear
        grid: !Cartesian
        settings:
          orders: [n_w]
          bounds: [[w_min, w_max]]
          extrap_policy: extrap_policy
          clamp_max_factor: clamp_max_factor
