stage: AdjusterConsumption

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm
        settings: {}

      - scheme: interpolation
        method: !Linear
        grid: endogenous
        settings:
          extrap_policy: extrap_policy

      - scheme: upper_envelope
        method: !FUES
        settings:
          m_bar: m_bar
          extrap_policy: extrap_policy

      - scheme: maximization
        method: !brent_max
        settings:
          n_sections: n_sections

  - on: dcsn_to_arvl_mover
    schemes:
      - scheme: interpolation
        method: !Linear
        grid: !Cartesian
        settings:
          orders: [n_w]
          bounds: [[w_min, w_max]]
          extrap_policy: extrap_policy
