stage: AdjusterConsumption

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm
        settings: {}

      - scheme: interpolation
        method: !Linear
        grid: endogenous

      - scheme: upper_envelope
        method: !FUES
        settings:
          m_bar: m_bar

  - on: dcsn_to_arvl_mover
    schemes:
      - scheme: interpolation
        method: !Linear
        grid: !Cartesian
        settings:
          orders: [n_w]
          bounds: [[w_min, w_max]]
