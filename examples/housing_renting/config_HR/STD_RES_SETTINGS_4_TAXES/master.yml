  functions_CRRA:
    owner_utility: {expr: ((c**alpha * (kappa*(H_nxt+iota))**(1-alpha))**(1-gamma) - 1)/(1-gamma), description: "Cobb\u2013\
        Douglas aggregator nested in CRRA utility for owners"}
    renter_utility: {expr: ((c**alpha * (kappa*(S+iota))**(1-alpha))**(1-gamma) - 1)/(1-gamma), description: "Cobb\u2013Douglas\
        \ aggregator nested in CRRA utility for renters"}
    marginal_utility: {expr: alpha * (c**alpha * (kappa*(S+iota))**(1-alpha))**(1-gamma) / c, description: "Marginal utility\
        \ for Cobb\u2013Douglas nested in CRRA"}
    owner_marginal_utility: {expr: alpha * (c**alpha * (kappa*(H_nxt+iota))**(1-alpha))**(1-gamma) / c, description: "Marginal\
