name: HousingMaster
description: Infinite horizon housing choice model with renting option and discrete housing grid
version: 1.6.3
connections_file: connections.yml
model_type: finite_horizon
horizon: 20
parameters:
  beta: 0.93
  r: 0.06
  r_H: 0.0
  gamma_1: 0.0
  xi: 0.0
  alpha: 0.77
  theta: 0.77
  gamma: 2.0
  rho: 0.58
  kappa: 0.075
  iota: 0.01
  phi: 0.07
  delta: 1
  delta_pb: 1
  b: 1e-100
  Pr: 0.1
  thorn: 0.5

  # Enable/disable capital income tax (toggle via CLI --use-taxes)
  use_taxes: false

  # Tax schedule (Australia 2015–16, net of LITO + Medicare levy), applied as an
  # asset-return tax rather than a labour-income tax.
  #
  # We treat taxable income as: y_tax = r * a   (annual return on liquid assets),
  # with r = 6% in this calibration.
  #
  # Scaling to model units:
  # - The Fella income process is normalised to mean 1 (see `generate_income_process.py`).
  # - 1.0 model income unit = 79,721.2 AUD/year (ABS AWE Nov 2016: 1,533.10 * 52).
  #
  # Asset-bracket representation (piecewise linear tax as a function of assets):
  #   T(a) = B + tau_a * (a - a0)  for a in [a0, a1)
  # where tau_a = tau_y * r and a0 = y0 / r (so T(a) == T_y(r*a)).
  tax_table:
    income_unit_AUD_per_year: 79721.2
    r_tax: 0.06

    # EGM constraint segments at tax bracket boundaries (for use_taxes=True)
    # These help the upper envelope algorithm resolve kinks/jumps in the policy function
    constraints:
      enabled: true             # Set to true to add constraint segments
      default_c_lb_pct: 0.30   # Default: c_lower = c_star * (1 - 0.40)
      default_c_ub_pct: 0.30   # Default: c_upper = c_star * (1 + 0.40)
      n_points_per_node: 100    # Number of constraint points per tax bracket boundary

    brackets:
      # 9-bracket version COMPRESSED to 0-20 range (scaled by 0.5 from original 0-40)
      # Marginal rates (tau_a) create kinks, B values recalculated
      #
      # Two intended level jumps (increased magnitude):
      # - Jump #1: +0.10 at a=3.87
      # - Jump #2: +0.15 at a=15.0
      - {a0: 0.0, a1: 2.20, B: 0.0, tau_a: 0.0}
      - {a0: 2.20, a1: 2.50, B: 0.0, tau_a: 0.0114}
      # Larger change up
      - {a0: 2.50, a1: 2.75, B: 0.00342, tau_a: 0.0204}
      # And a noticeable drop (kink), without a level jump
      - {a0: 2.75, a1: 3.87, B: 0.00852, tau_a: 0.005}
      # JUMP #1: +0.10 at a = 3.87
      - {a0: 3.87, a1: 6.97, B: 0.11412, tau_a: 0.024}
      # Subsidy bracket: larger subsidy (B=0.05), left-closed so a=6.97 uses THIS bracket
      - {a0: 6.97, a1: 8.36, B: 0.05, tau_a: 0.0192, left_closed: true}
      # Larger rise into top bracket region (adjusted for subsidy continuity)
      - {a0: 8.36, a1: 12.0, B: 0.076688, tau_a: 0.027}
      # Kink down at a=12 (no level jump, just marginal rate drops)
      - {a0: 12.0, a1: 15.0, B: 0.174968, tau_a: 0.018}
      # JUMP #2: +0.15 at a = 15.0
      - {a0: 15.0, a1: 20.0, B: 0.378968, tau_a: 0.0294}
      - {a0: 20.0, a1: .inf, B: 0.525968, tau_a: 0.0294}

