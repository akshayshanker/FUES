# Housing Choice Model with Renting - Master Configuration
# =================================================
# This configuration combines all five stages of the housing-renting model
# with discrete choice, following the structure in housing_renting.md

name: "HousingMaster"
description: "Infinite horizon housing choice model with renting option and discrete housing grid"
version: "1.6.3"

# Reference to separate connections file
connections_file: "connections.yml"

# Model type and horizon specification
# Note: In future versions, we will support infinite horizon with reusable stages
model_type: "finite_horizon"  # Options: finite_horizon, infinite_horizon
horizon: 20                    # Number of periods to create (for finite horizon)

# Global parameters shared across all stages - Updated with Fella parameters
parameters:
  beta: 0.93            # Discount factor
  r: 0.06           # Interest rate
  r_H: 0.0              # Housing return
  gamma_1: 0.0          # FELLA parameter
  xi: 0.0               # FELLA parameter
  alpha: 0.77           # Consumption weight in utility (theta in Fella)
  theta: 0.77           # Same as alpha, kept for consistency with Fella
  gamma: 2.0            # CRRA coefficient (risk aversion parameter)
  rho: 0.58              # Elasticity of substitution between consumption and housing
  kappa: 0.77          # Housing service scaling factor
  iota: 0.01           # Housing service constant
  phi: 0.07            # Transaction cost for housing adjustment (Fella phi)
  delta: 1            # Depreciation
  delta_pb: 1            # Laibson discounting
  b: 1e-100             # Borrowing constraint
  Pr: 0.05              # Rental price
  thorn: 0.9            # Markdown on renter's housing utility from renting 
  

  # Income shock parameters - Explicit Markov process from Fella
  # Transition matrix for Markov process
  Pi:
    - [0.8, 0.1, 0.1]
    - [0.05, 0.9, 0.05]
    - [0.1, 0.1, 0.8]
  z_vals: [0.1, 1.1526, 4.167]  # Shock values


# Global settings shared across all stages
settings:
  tol: 1.0e-6           # Convergence tolerance
  max_iter: 4000        # Maximum iterations
  
  # Grid parameters - Updated from Fella
  a_min: 1E-1         # Minimum asset value
  a_max: 35.0           # Maximum asset value (Fella's grid_max_A)
  a_points: 4000        # Number of asset grid points (Fella's grid_size)

  c_max: 50.0           # Maximum consumption
  
  H_min: 0.0            # Minimum housing value
  H_max: 5.0            # Maximum housing value (Fella's grid_max_H)
  H_points: 7           # Number of housing grid points (Fella's grid_size_H)
  S_min: 0.0            # Minimum housing value
  S_max: 5.0            # Maximum housing value (Fella's grid_max_H)
  S_points: 7           # Number of housing grid points (Fella's grid_size_H)
  
  w_min: 1E-1               # Minimum cash-on-hand
  w_max: 40.0           # Maximum cash-on-hand (increased to accommodate shock values)
  w_points: 4000        # Number of cash-on-hand grid points
  
  a_nxt_min: 1E-1           # Minimum next-period asset value
  a_nxt_max: 35.0       # Maximum next-period asset value (matches a_max)
  a_nxt_points: 4000    # Number of next-period asset grid points
  
  # Income shock discretization - Now explicitly using Fella's values
  y_points: 3           # Number of shock grid points (length of z_vals)
  y_stop: 2 
  m_bar: 1.0001           # Upper envelope parameter for FUES
  lb: 10                 # Look-back parameter for FUES
  rfc_radius: 0.75
  rfc_n_iter: 20
  n_constraint_points: 100
  n_constraint_points_nxt: 2500
  N_arg_grid_vfi: 500   # Number of grid points for VFI_GRID

  # Asset policy gradient filtering (optional)
  filter_a_jumps: false  # If true, filter points where da/dm exceeds max_a_gradient
  max_a_gradient: 1.5    # Maximum allowed gradient of asset policy

  # KT conditions override at jump constraints (for testing)
  override_KT_conditions_at_jump: false  # When true, disables FOC filtering at jumps

  # Method-specific upper envelope kwargs
  # These are passed directly to the UE engine (FUES, DCEGM, etc.)
  # Note: m_bar and lb can also be set at top-level settings for backward compatibility
  # Method-specific upper envelope kwargs
  # These are passed directly to the UE engine (FUES, DCEGM, etc.)
  ue_kwargs:
    FUES:
      # Core parameters
      m_bar: 1.0              # Jump threshold for same-branch tests
      lb: 4                   # Look-back window size
      
      # Intersection handling
      include_intersections: true       # Add intersection points at jumps
      return_intersections_separately: false  # Return intersections in separate array
      single_intersection: false        # Only compute single intersection per jump
      
      # Jump filtering
      endog_mbar: false       # Use endogenous m_bar based on policy gradients
      padding_mbar: 0.0       # Padding for m_bar calculation
      no_double_jumps: true   # Filter out consecutive jumps
      disable_jump_checks: false  # Disable manual jump check overrides
      
      # Numerical tolerances
      eps_d: 1.0e-14          # Machine epsilon protection for divisions
      eps_sep: 1.0e-08        # Minimum separation when creating intersections
      eps_fwd_back: 0.5       # Forward/backward scan proximity threshold
      parallel_guard: 1.0e-10 # Tolerance for near-parallel segment detection
    DCEGM: {}
    CONSAV: {}
