stage: RetireeConsumption

methods:
  - on: cntn_to_dcsn_mover
    schemes:
      - scheme: bellman_backward
        method: !egm

      - scheme: interpolation
        method: !Linear
        grid: endogenous

      - scheme: upper_envelope
        method: !FUES
        settings:
          m_bar: m_bar

  - on: dcsn_to_arvl_mover
    schemes:
      - scheme: interpolation
        method: !Linear
        grid: !Cartesian
        settings:
          orders: [n_a_ret]
          bounds: [[a_ret_min, a_ret_max]]
