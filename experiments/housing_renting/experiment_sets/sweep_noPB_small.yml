# Small Sweep Experiment Set - For Testing
# ==========================================
# Smaller grid for quick testing of sweep mode

# Experiment identification
config_id: "paper-v1-test"
trial_id: "sweep-noPB-small"
output_dir: "/scratch/tp66/${USER}/FUES/solutions/housing_renting"  # Base output directory

# Reference method for baseline comparison
ref_method: VFI_HDGRID_GPU

param_paths:
  - master.methods.upper_envelope    # Method (excluded from hash)
  - master.settings.a_points         # Asset grid points
  - master.settings.H_points         # Housing/Services grid points

sweep:
  # Methods to sweep over
  methods:
    - FUES
    - CONSAV
    - DCEGM
    - VFI
  
  # Smaller grid sizes for testing
  grid_sizes:
    - 1000
    - 2000
    - 4000
  
  # Fewer H sizes for testing
  H_sizes:
    - 7
    - 10
    - 15

# Fixed parameters
fixed:
  delta_pb: 1
  periods: 20

# Override params when constructing ref_params for baseline comparison
ref_params_override:
  grid_sizes: 200000  # Compare to high-res VFI baseline
