site_name: FUES
site_description: Fast Upper-Envelope Scan for discrete-continuous dynamic programming
site_author: Loretti I. Dobrescu and Akshay Shanker
site_url: https://akshayshanker.github.io/FUES/
repo_url: https://github.com/akshayshanker/FUES
repo_name: akshayshanker/FUES

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.mark
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/fues-interactive.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/akshayshanker/FUES

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Algorithm:
    - How FUES Works: algorithm/fues-algorithm.md
  - API Reference:
    - FUES: api/fues.md
    - EGM_UE Registry: api/egm-ue.md
    - Helpers: api/helpers.md
  - Examples:
    - Retirement Choice Model: examples/retirement.md
    - Retirement API Reference: examples/retirement-api.md
  - Notebooks:
    - Retirement Model with FUES: notebooks/retirement_fues.ipynb
  - Changelog: changelog.md
