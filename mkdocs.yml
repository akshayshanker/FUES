site_name: FUES
site_description: Fast Upper-Envelope Scan for discrete-continuous dynamic programming
site_author: Loretti I. Dobrescu and Akshay Shanker
site_url: https://akshayshanker.github.io/FUES/
repo_url: https://github.com/akshayshanker/FUES
repo_name: akshayshanker/FUES

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: images/fues-logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.mark
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/fues-interactive.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

copyright: >-
  &copy; Akshay Shanker &mdash;
  Logo font: TNG Title by Ukraine Fonts

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/akshayshanker/FUES

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
  - Algorithm: algorithm/fues-algorithm.md
  - Examples:
    - Overview: examples/index.md
    - Retirement Choice: examples/retirement.md
    - Durables: examples/housing.md
    - Housing-Renting: examples/housing-renting.md
  - Notebooks:
    - Retirement: notebooks/retirement_fues.ipynb
  - API Reference:
    - FUES & EGM_UE: api/fues.md
    - Retirement Example: api/retirement.md
  - Changelog: changelog.md
