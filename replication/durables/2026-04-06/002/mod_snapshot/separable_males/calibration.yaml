# Calibration for the durables / housing adjustment cost model — MALES
# Reference: Dobrescu & Shanker, Application 2
# Wage process from Eggsandbaskets 3.0 male settings
calibration:
  # Financial returns
  r: 0.045
  R: 1.045
  r_H: 0
  R_H: 1.0

  # Preferences
  beta: 0.945
  alpha: 0.7
  gamma_c: 3.5
  gamma_h: 1.5
  kappa: 0.06
  sigma: 0.001

  # Housing frictions
  delta: 0
  tau: 0.12
  chi: 0

  # Terminal value
  theta: 1.3498
  K: 1.3

  # Income AR(1) in logs: log z[>] = phi_w * log z + sigma_w * eps[>],  eps[>] ~ N(0,1)
  # Source: Eggsandbaskets 3.0 settings/Eggs3.0_dev/settings.yml, male section
  phi_w: 0.9044149          # rho_z: AR(1) persistence (male)
  sigma_w: 0.0921957        # sigma_z: innovation std dev (male)

  # Wage function polynomial — MALE
  # Source: Eggsandbaskets 3.0 settings/Eggs3.0_dev/settings.yml, male.lambdas
  lambdas:
    - 9.3727655
    - 0.1090508
    - -0.00293958
    - 0.00004127
    - -0.0000002334
    - 0.01516798
    - -0.00012572
  tau_av: 30
  t0: 40
