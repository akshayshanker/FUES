name: AdjustmentDecision
kind: branching
branch_control: agent

symbols:
  spaces:
    Xa: '@def R+'          # financial assets domain
    Xh: '@def R+'          # housing stock domain
    Xw: '@def R+'          # total wealth / cash-on-hand domain

  prestate:
    a: '@in Xa'            # financial assets
    h: '@in Xh'            # housing stock
    z: '@in R++'           # previous income realisation

  states:
    a: '@in Xa'            # identity a = a[<] -> tag = {<, ~}
    h: '@in Xh'            # identity h = h[<] -> tag = {<, ~}
    z: '@in R++'           # identity z = z[<] -> tag = {<, ~}

  exogenous:
    eps[>]:
      - '@in R'
      - '@dist Normal(0, 1)'    # IID innovation at continuation

  poststates:
    keep:
      w_kp: '@in Xw'      # keeper cash-on-hand = R * a + y(z_kp)
      h_kp: '@in Xh'      # housing stock passed to keeper
      z_kp: '@in R++'     # next-period income (from AR(1) transition eq)
    adjust:
      w_adj: '@in Xw'     # total wealth = R * a + R_H * (1 - delta) * h + y(z_adj)
      z_adj: '@in R++'    # next-period income (from AR(1) transition eq)

  controls:
    d: '@in {keep, adjust}'

  values:
    V[<]: '@in R'
    V: '@in R'
    V[>]:
      keep: '@in R'
      adjust: '@in R'

  values_marginal:
    d_{a}V[<]: '@in R'          # partial_a v at arrival
    d_{h}V[<]: '@in R'          # partial_h v at arrival
    d_{a}V: '@in R'             # partial_a v at decision
    d_{h}V: '@in R'             # partial_h v at decision
    d_{w_kp}V[>]: '@in R'       # keep branch: partial_{w_kp} v[>]
    d_{h_kp}V[>]: '@in R'       # keep branch: partial_{h_kp} v[>]
    d_{w_adj}V[>]: '@in R'      # adjust branch: partial_{w_adj} v[>]

  parameters:
    R: '@in R+'            # gross financial return (1 + r)
    R_H: '@in R+'          # gross housing return (1 + r_H)
    delta: '@in [0,1]'     # housing depreciation rate
    rho_z: '@in (0,1)'     # AR(1) persistence (phi_w in calibration)
    sigma_z: '@in R+'      # AR(1) innovation std dev (sigma_w in calibration)

equations:
  arvl_to_dcsn_transition: identity    # a, h, z all in prestate & states -> Rule 3

  dcsn_to_cntn_transition:
    keep: |
      z_kp = z^rho_z * exp(sigma_z * eps[>])
      w_kp = R * a + y(z_kp)
      h_kp = (1 - delta) * h
    adjust: |
      z_adj = z^rho_z * exp(sigma_z * eps[>])
      w_adj = R * a + R_H * (1 - delta) * h + y(z_adj)

  cntn_to_dcsn_mover:
    Bellman: |
      V = max_{d}(V[>][keep], V[>][adjust])
    MarginalBellman: |
      d_{a}V = d * R * d_{w_adj}V[>] + (1 - d) * R * d_{w_kp}V[>]
      d_{h}V = d * R_H * (1 - delta) * d_{w_adj}V[>] + (1 - d) * (1 - delta) * d_{h_kp}V[>]

  dcsn_to_arvl_mover:
    Bellman: |
      V[<] = E_{z}(V)
    ShadowBellman: |
      d_{a}V[<] = E_{z}(d_{a}V)
      d_{h}V[<] = E_{z}(d_{h}V)
